[pytest]
minversion = 7.0
addopts = -v --strict-markers --tb=short
testpaths = src/backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = src/backend/shared
omit = 
    */tests/*
    */__init__.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
