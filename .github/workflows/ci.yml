name: CI

on: [push, pull_request]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema PyYAML colour pytest
      - name: Run token build
        run: python .tools/token_build.py
      - name: Run tests
        run: python -m pytest -q
